query CourseAnnouncementsQuery($courseId: ID!, $cursor: String) {
    course: legacyNode(_id: $courseId, type: Course) {
        ... on Course {
            _id
            announcements: discussionsConnection(
                first: 20
                after: $cursor
                filter: { isAnnouncement: true }
            ) {
                pageInfo {
                    hasNextPage
                    endCursor
                }
                nodes {
                    _id
                    title
                    message
                    postedAt
                    participant {
                        read
                    }
                }
            }
        }
    }
}