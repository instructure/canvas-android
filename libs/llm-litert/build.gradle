apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.instructure.llm.litert'
    compileSdkVersion Versions.COMPILE_SDK
    buildToolsVersion Versions.BUILD_TOOLS

    defaultConfig {
        minSdkVersion Versions.MIN_SDK
        targetSdkVersion Versions.TARGET_SDK
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
        }
        release {
            debuggable false
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }
}

dependencies {
    implementation project(path: ':pandautils')

    /* Kotlin */
    implementation Libs.KOTLIN_STD_LIB
    implementation Libs.KOTLIN_COROUTINES_CORE
    implementation Libs.KOTLIN_COROUTINES_ANDROID

    /* LiteRT-LM */
    implementation 'com.google.ai.edge.litertlm:litertlm-android:0.9.0-alpha01'
}
